    main{flex:1;min-height:0;display:flex;gap:14px;padding:14px 18px 12px}.boardWrap{flex:1;min-width:0;display:flex;flex-direction:column}.board{flex:1;min-height:0;display:grid;grid-template-columns:repeat(5,minmax(230px,1fr));gap:12px;overflow:auto;padding-bottom:8px}.column{min-height:0;background:rgba(255,255,255,.9);border:1px solid var(--line2);border-radius:var(--r);box-shadow:0 2px 8px rgba(20,20,20,.03);display:flex;flex-direction:column}.column.drop{outline:2px dashed var(--orange);outline-offset:-6px;background:#fffaf2}.colHead{height:50px;display:flex;align-items:center;gap:9px;padding:0 12px;border-bottom:1px solid var(--line2);font-weight:850}.dot{width:23px;height:23px;border-radius:50%;display:grid;place-items:center;color:white;font-size:12px}.count{margin-left:auto;color:#4a4d55;font-weight:750}.more{border:0;background:transparent;color:var(--muted);font-weight:900;font-size:17px;padding:4px}.cards{overflow:auto;padding:10px;display:flex;flex-direction:column;gap:10px;min-height:120px}.card{background:#fff;border:1px solid var(--line);border-radius:12px;padding:10px;min-height:118px;box-shadow:0 4px 13px rgba(30,30,30,.04);cursor:pointer;transition:transform .12s ease,border-color .12s ease,box-shadow .12s ease,background .12s ease;position:relative}.card:hover{transform:translateY(-1px);border-color:#f2bd65;box-shadow:0 12px 28px rgba(248,153,28,.14)}.card.selected{border-color:var(--orange);box-shadow:0 0 0 1px var(--orange),0 10px 24px rgba(248,153,28,.16)}.card.dragging{opacity:.55;transform:scale(.98)}.card.ai{border-color:#d8c2ff;background:linear-gradient(180deg,#fff,#fbf8ff)}.card.critical{border-left:4px solid var(--red)}.cardTop{display:flex;gap:8px;align-items:flex-start}.check{width:17px;height:17px;border:1px solid var(--line);border-radius:5px;display:grid;place-items:center;flex-shrink:0;margin-top:1px;background:#fff;color:#fff}.check.on{background:var(--orange);border-color:var(--orange)}.title{font-size:13px;font-weight:790;line-height:1.35;min-height:36px;flex:1}.cardMenu{border:0;background:transparent;color:var(--muted);padding:0 2px;font-weight:900}.chips{margin-top:9px;display:flex;flex-wrap:wrap;gap:6px}.chip{padding:3px 7px;border-radius:6px;font-size:11px;font-weight:790;line-height:1.1;display:inline-flex;align-items:center;gap:4px}.c-red{color:#b71919;background:var(--redSoft)}.c-yellow{color:#9d6400;background:var(--yellowSoft)}.c-green{color:#0f773c;background:var(--greenSoft)}.c-blue{color:#135ba5;background:var(--blueSoft)}.c-purple{color:#6d35c6;background:var(--purpleSoft)}.c-gray{color:#52545a;background:var(--graySoft)}.meta{margin-top:11px;display:flex;align-items:center;gap:12px;color:var(--muted);font-size:11px}.miniava{margin-left:auto;width:24px;height:24px;border-radius:50%;display:grid;place-items:center;background:#f3c38a;color:#562800;font-weight:900}.progress{margin-top:10px;height:6px;background:#eef0f3;border-radius:999px;overflow:hidden}.progress span{display:block;height:100%;background:var(--orange);border-radius:999px}.add{padding:12px 14px 15px;color:#555963;font-weight:750;border:0;background:transparent;text-align:left}.add:hover{color:#a85f00}

px;color:#34363d}.ball{color:var(--orange);font-size:22px;line-height:16px}.aiBox{border:1px solid #dcc8ff;background:#fbf8ff;border-radius:11px;padding:12px}.aiBox b{color:#6d35c6}.aiBox p{color:#555963;line-height:1.45}.sourceBox{border:1px solid var(--line2);background:#fafafa;border-radius:10px;padding:10px;color:#555963;font-size:12px;line-height:1.45}
    .drawer{position:fixed;top:0;right:-420px;width:390px;height:100vh;background:#fff;box-shadow:var(--shadow);z-index:40;border-left:1px solid var(--line);transition:.2s ease;display:flex;flex-direction:column}.drawer.show{right:0}.drawerHead{height:58px;border-bottom:1px solid var(--line2);display:flex;align-items:center;padding:0 16px}.drawerBody{padding:16px;overflow:auto}.modalShade{position:fixed;inset:0;background:rgba(20,20,20,.28);z-index:60;display:none;align-items:center;justify-content:center}.modalShade.show{display:flex}.modal{width:620px;max-width:calc(100vw - 80px);background:#fff;border-radius:16px;box-shadow:var(--shadow);overflow:hidden}.modalHead{height:56px;border-bottom:1px solid var(--line2);display:flex;align-items:center;padding:0 16px}.modalBody{padding:16px;display:grid;grid-template-columns:1fr 1fr;gap:12px}.modalBody .wide{grid-column:1/-1}.modalFoot{height:58px;border-top:1px solid var(--line2);display:flex;align-items:center;justify-content:flex-end;gap:10px;padding:0 16px}.toast{position:fixed;right:18px;bottom:18px;z-index:80;display:flex;flex-direction:column;gap:8px}.toastItem{background:#111827;color:#fff;border-radius:11px;padding:10px 12px;box-shadow:var(--shadow);min-width:250px}.toastItem b{display:block}.toastItem small{color:#d4d5d8}.menu{position:fixed;background:#fff;border:1px solid var(--line);border-radius:10px;box-shadow:var(--shadow);z-index:70;overflow:hidden;min-width:185px}.menu button{display:block;width:100%;border:0;background:#fff;text-align:left;padding:9px 11px;font-weight:700}.menu button:hover{background:#fff8ef}.footer{height:25px;border-top:1px solid var(--line2);display:flex;align-items:center;gap:8px;padding:0 18px;color:var(--muted);font-size:11px;background:#fff}.okdot{width:8px;height:8px;border-radius:50%;background:var(--green)}
  </style>

<body>
<div class="app">
  <header class="topbar">
    <div class="hamb">☰</div><div class="brand">Feladatközpont <span>•</span> User Dashboard</div>
    <div class="search"><span>⌕</span><input id="searchInput" placeholder="Keresés feladatok, forrásrekordok, címkék között..."/><span class="kbd">Ctrl K</span></div>
    <button id="btnFilters" class="btn">⛃ Szűrők <span id="filterCount">0</span></button>
    <button id="btnNew" class="btn primary">＋ Új feladat</button>
    <div class="spacer"></div>
    <button id="btnNotif" class="ico">🔔<span id="notifBadge" class="badge">0</span></button><button class="ico">💬<span id="commentBadge" class="badge blueb">0</span></button><button class="ico">✦</button>
    <div class="avatar a1">GB</div><div class="avatar a2">KM</div><div class="avatar a3">+3</div>
  </header>
  <nav class="modulebar"><button class="modtab active">Saját nézet</button><button class="modtab">Csapat</button><button class="modtab">Minden jogosult</button><button class="modtab">Naptár</button><button class="modtab">Automatizmusok</button><button class="modtab">Beállítások</button></nav>
  <section class="toolbar"><div class="stats" id="stats"></div><div class="toolbarRight"><div class="viewSwitch"><button id="boardBtn" class="active">▦</button><button id="listBtn">☷</button></div><select id="sortSelect" class="select"><option value="priority">Rendezés: prioritás</option><option value="due">Rendezés: határidő</option><option value="newest">Rendezés: legújabb</option></select><button id="btnReset" class="btn">↺ Minta reset</button></div></section>
  <div id="bulkbar" class="bulkbar"><b id="bulkCount">0 kijelölve</b><button class="btn" onclick="bulkMove('in_progress')">Folyamatban</button><button class="btn" onclick="bulkMove('waiting')">Jóváhagyásra</button><button class="btn" onclick="bulkMove('done')">Kész</button><button class="btn danger" onclick="clearSelection()">Kijelölés törlése</button></div>
  <main><section class="boardWrap"><div id="board" class="board"></div><div id="listView" class="listView"></div></section><aside><div class="sideHead"><b>Kijelölt feladat</b><button class="close" onclick="unselect()">×</button></div><div id="sideBody" class="sideBody"></div></aside></main>
  <footer class="footer"><span class="okdot"></span><span id="syncText">Standalone placeholder mód · Supabase live bekötésre előkészítve</span><span class="spacer"></span><span>postMessage bridge aktív</span></footer>
</div>
<div id="filterDrawer" class="drawer"><div class="drawerHead"><b>Szűrők</b><button class="close" onclick="toggleDrawer('filterDrawer',false)">×</button></div><div class="drawerBody"><label>Modul / forrás</label><select id="fModule" class="field"><option value="all">Összes</option><option value="cases">Ügyek</option><option value="document">Dokumentumok</option><option value="partner">Partner</option><option value="finance">Pénzügy</option><option value="operations">Műveletek</option><option value="ai">AI</option></select><br><br><label>Prioritás</label><select id="fPriority" class="field"><option value="all">Összes</option><option value="critical">Kritikus</option><option value="high">Magas</option><option value="normal">Normál</option><option value="low">Alacsony</option></select><br><br><label><input id="fAi" type="checkbox"/> Csak AI / agent javaslat</label><br><br><label><input id="fHideDone" type="checkbox"/> Kész feladatok elrejtése</label><br><br><button class="btn primary" onclick="applyFilters()">Szűrők alkalmazása</button> <button class="btn" onclick="resetFilters()">Reset</button></div></div>
<div id="notifDrawer" class="drawer"><div class="drawerHead"><b>Értesítések</b><button class="close" onclick="toggleDrawer('notifDrawer',false)">×</button></div><div class="drawerBody" id="notifList"></div></div>
<div id="taskModal" class="modalShade"><div class="modal"><div class="modalHead"><b id="modalTitle">Új feladat</b><button class="close" onclick="closeModal()">×</button></div><div class="modalBody"><div class="wide"><label>Cím</label><input id="mTitle" class="field"/></div><div><label>Forrás/modul</label><select id="mModule" class="field"><option value="cases">Ügyek</option><option value="document">Dokumentumok</option><option value="partner">Partner</option><option value="finance">Pénzügy</option><option value="operations">Műveletek</option><option value="ai">AI</option></select></div><div><label>Státusz</label><select id="mStatus" class="field"><option value="new">Új</option><option value="in_progress">Folyamatban</option><option value="waiting">Jóváhagyásra vár</option><option value="ai_preparing">AI előkészítés</option><option value="done">Kész</option></select></div><div><label>Prioritás</label><select id="mPriority" class="field"><option value="critical">Kritikus</option><option value="high">Magas</option><option value="normal">Normál</option><option value="low">Alacsony</option></select></div><div><label>Felelős</label><select id="mAssignee" class="field"><option value="me">Én</option><option value="gb">Gál Balázs</option><option value="km">Kovács Míra</option><option value="team">Csapat</option></select></div><div><label>Határidő</label><input id="mDue" class="field" placeholder="Ma 14:00"/></div><div><label>Forrás típus</label><input id="mSourceType" class="field" placeholder="case / record / event"/></div><div class="wide"><label>Forrás ID</label><input id="mSourceId" class="field" placeholder="későbbi Supabase rekordazonosító"/></div><div class="wide"><label>Leírás</label><textarea id="mDesc" class="field area"></textarea></div></div><div class="modalFoot"><button class="btn" onclick="closeModal()">Mégse</button><button id="saveTask" class="btn primary" onclick="saveModal()">Mentés</button></div></div></div>
<div id="toast" class="toast"></div><div id="menuHost"></div>
<script>
(function(){
const $=id=>document.getElementById(id); const html=s=>String(s??'').replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]));
const LS='feladatkozpont_standalone_lux_v1'; const CURRENT='Gál Balázs';
const COLS=[['new','Új','＋','var(--blue)'],['in_progress','Folyamatban','▶','var(--orange)'],['waiting','Jóváhagyásra vár','◷','var(--yellow)'],['ai_preparing','AI előkészítés','✦','var(--purple)'],['done','Kész','✓','var(--green)']];
let state={view:'board',selectedId:null,selectedIds:[],sideTab:'details',search:'',sort:'priority',filters:{module:'all',priority:'all',onlyAi:false,hideDone:false},notifications:[{text:'Minta értesítés: új teendő érkezett',at:'most',read:false}],tasks:[]};
function sample(){return[
{id:'T-1001',title:'Minta feladat: új ügy ellenőrzése',module:'cases',status:'new',priority:'critical',assignee:'me',due:'Ma 10:00',source_type:'case',source_id:'SRC-001',description:'Placeholder kártya. Később bármelyik Supabase rekordból automatikusan jöhet ilyen feladat.',tags:['új','ellenőrzés'],progress:30,comments:[{by:'Rendszer',at:'most',text:'Automatikusan létrehozott feladat mintája.'}],checklist:[{text:'Forrásrekord megnyitása',done:false},{text:'Adatok ellenőrzése',done:false}],activity:[{at:'Most',text:'Kártya létrehozva.'}]},
{id:'T-1002',title:'Hiányzó adat pótlása',module:'document',status:'new',priority:'high',assignee:'km',due:'Ma 14:30',source_type:'record',source_id:'SRC-002',description:'Dokumentum vagy mezőhiány placeholder.',tags:['adat','hiányzó'],progress:10,comments:[],checklist:[{text:'Hiányzó mezők listázása',done:true},{text:'Érintett user értesítése',done:false}],activity:[{at:'Ma',text:'Hiányzó adat jelölve.'}]},
{id:'T-1003',title:'Partner visszajelzés követése',module:'partner',status:'in_progress',priority:'normal',assignee:'gb',due:'Holnap 09:00',source_type:'partner_event',source_id:'SRC-003',description:'Külső vagy belső visszajelzés követési placeholder.',tags:['partner','follow-up'],progress:55,comments:[{by:'Kovács Míra',at:'1 órája',text:'Válaszra várunk.'}],checklist:[{text:'Utolsó üzenet ellenőrzése',done:true},{text:'Emlékeztető előkészítése',done:false}],activity:[{at:'1 órája',text:'Komment hozzáadva.'}]},

{id:'T-1006',title:'Lezárt minta feladat',module:'finance',status:'done',priority:'low',assignee:'gb',due:'Tegnap',source_type:'record',source_id:'SRC-006',description:'Kész állapotú placeholder.',tags:['lezárt'],progress:100,comments:[],checklist:[{text:'Ellenőrzés kész',done:true}],activity:[{at:'Tegnap',text:'Feladat lezárva.'}]}
]}
function load(){try{const s=JSON.parse(localStorage.getItem(LS)); if(s&&s.tasks) state={...state,...s}; else state.tasks=sample()}catch(e){state.tasks=sample()}} function save(){localStorage.setItem(LS,JSON.stringify(state))}
function emit(type,payload){try{parent.postMessage({type,payload,source:'feladatkozpont'},'*')}catch(e){}}
window.addEventListener('message',e=>{const m=e.data||{}; if(m.type==='task_center_set_tasks'&&m.payload?.tasks){state.tasks=m.payload.tasks; save(); render(); toast('Live adatok betöltve','Supabase/Retool bridge payload fogadva.')}});
function col(s){return COLS.find(c=>c[0]===s)||COLS[0]} function user(k){return {me:{name:'Én',ini:'ÉN'},gb:{name:'Gál Balázs',ini:'GB'},km:{name:'Kovács Míra',ini:'KM'},team:{name:'Csapat',ini:'CS'}}[k]||{name:k||'Nincs',ini:'--'}}
function filtered(){let a=[...state.tasks]; const f=state.filters, q=state.search.toLowerCase(); if(q)a=a.filter(t=>[t.title,t.module,t.priority,t.assignee,t.source_type,t.source_id,(t.tags||[]).join(' ')].join(' ').toLowerCase().includes(q)); if(f.module!=='all')a=a.filter(t=>t.module===f.module); if(f.priority!=='all')a=a.filter(t=>t.priority===f.priority); if(f.onlyAi)a=a.filter(t=>t.module==='ai'||t.ai_state); if(f.hideDone)a=a.filter(t=>t.status!=='done'); const rank={critical:1,high:2,normal:3,low:4}; a.sort((x,y)=>state.sort==='priority'?rank[x.priority]-rank[y.priority]:state.sort==='newest'?(y.created_at||0)-(x.created_at||0):String(x.due||'').localeCompare(String(y.due||''))); return a}
function render(){save(); renderStats(); renderBoard(); renderList(); renderSide(); renderBulk(); renderBadges(); renderNotifications(); $('board').classList.toggle('hidden',state.view!=='board'); $('listView').classList.toggle('show',state.view==='list');}
function renderStats(){const t=filtered(); const stat=[['Nyitott',t.filter(x=>x.status!=='done').length,'＋','var(--blue)'],['Folyamatban',t.filter(x=>x.status==='in_progress').length,'▶','var(--orange)'],['Kritikus',t.filter(x=>x.priority==='critical').length,'!','var(--red)'],['AI javaslat',t.filter(x=>x.module==='ai'||x.ai_state).length,'✦','var(--purple)']]; $('stats').innerHTML=stat.map(s=>`<div class="stat"><div class="statIcon" style="background:${s[3]}">${s[2]}</div><div><small>${s[0]}</small><b>${s[1]}</b></div><span class="delta">live-ready</span></div>`).join('')}
function renderBoard(){const data=filtered(); $('board').innerHTML=COLS.map(c=>{const arr=data.filter(t=>t.status===c[0]); return `<div class="column" ondragover="event.preventDefault();this.classList.add('drop')" ondragleave="this.classList.remove('drop')" ondrop="TC.dropCard(event,'${c[0]}')"><div class="colHead"><span class="dot" style="background:${c[3]}">${c[2]}</span>${c[1]}<span class="count">${arr.length}</span><button class="more" onclick="TC.openColumnMenu(event,'${c[0]}')">⋯</button></div><div class="cards">${arr.map(cardHtml).join('')}</div><button class="add" onclick="TC.openModalForStatus('${c[0]}')">＋ Feladat hozzáadása</button></div>`}).join('')}
function cardHtml(t){const u=user(t.assignee); return `<article class="card ${t.id===state.selectedId?'selected':''} ${t.module==='ai'||t.ai_state?'ai':''} ${t.priority==='critical'?'critical':''}" draggable="true" ondragstart="TC.dragCard(event,'${t.id}')" onclick="TC.selectTask('${t.id}')" ondblclick="TC.editTask('${t.id}')"><div class="cardTop"><span class="check ${state.selectedIds.includes(t.id)?'on':''}" onclick="TC.toggleSelect(event,'${t.id}')">✓</span><div class="title">${html(t.title)}</div><button class="cardMenu" onclick="TC.openCardMenu(event,'${t.id}')">⋯</button></div><div class="chips">${chip(priorityLabel(t.priority),prioClass(t.priority))}${chip(moduleLabel(t.module),moduleClass(t.module))}${t.ai_state?chip('AI','c-purple'):''}</div><div class="meta"><span>📅 ${html(t.due||'-')}</span><span>💬 ${(t.comments||[]).length}</span><span>☑ ${(t.checklist||[]).filter(x=>x.done).length}/${(t.checklist||[]).length}</span><span class="miniava">${u.ini}</span></div><div class="progress"><span style="width:${t.progress||0}%"></span></div></article>`}
function renderList(){const rows=filtered().map(t=>`<tr onclick="TC.selectTask('${t.id}')"><td><b>${html(t.title)}</b><br><small>${html(t.source_type||'')} · ${html(t.source_id||'')}</small></td><td>${chip(col(t.status).label,'c-gray')}</td><td>${chip(priorityLabel(t.priority),prioClass(t.priority))}</td><td>${chip(moduleLabel(t.module),moduleClass(t.module))}</td><td>${html(user(t.assignee).name)}</td><td>${html(t.due||'-')}</td><td>${(t.comments||[]).length}</td></tr>`).join(''); $('listView').innerHTML=`<table><thead><tr><th>Feladat</th><th>Státusz</th><th>Prioritás</th><th>Forrás</th><th>Felelős</th><th>Határidő</th><th>Komment</th></tr></thead><tbody>${rows}</tbody></table>`}
function renderSide(){const t=getSelected(); if(!t){$('sideBody').innerHTML='<div class="sourceBox"><b>Nincs kijelölt feladat</b><br>Kattints egy kártyára. A jobb oldali panelen lesz részlet, checklist, komment, activity és AI/agent művelet.</div>';return} const tabs=[['details','Részletek'],['checklist','Checklist'],['comments','Kommentek'],['activity','Activity'],['agent','AI / Agent']]; $('sideBody').innerHTML=`<div class="selectedTitle">${html(t.title)}</div><div class="sourceLine">${html(t.source_type||'source')} · ${html(t.source_id||t.id)}</div><div class="chips">${chip(priorityLabel(t.priority),prioClass(t.priority))}${chip(moduleLabel(t.module),moduleClass(t.module))}${t.ai_state?chip('AI javaslat','c-purple'):''}</div><div class="sideTabs">${tabs.map(x=>`<button class="${state.sideTab===x[0]?'active':''}" onclick="TC.setSideTab('${x[0]}')">${x[1]}</button>`).join('')}</div>${details(t)}${checklist(t)}${comments(t)}${activity(t)}${agent(t)}`}
function details(t){return `<section class="panelSec ${state.sideTab==='details'?'active':''}"><div class="detailGrid"><label>Felelős</label><select class="field" onchange="TC.updateSelected('assignee',this.value)"><option value="me" ${t.assignee==='me'?'selected':''}>Én</option><option value="gb" ${t.assignee==='gb'?'selected':''}>Gál Balázs</option><option value="km" ${t.assignee==='km'?'selected':''}>Kovács Míra</option><option value="team" ${t.assignee==='team'?'selected':''}>Csapat</option></select><label>Státusz</label><select class="field" onchange="TC.updateSelected('status',this.value)">${COLS.map(c=>`<option value="${c[0]}" ${t.status===c[0]?'selected':''}>${c[1]}</option>`).join('')}</select><label>Prioritás</label><select class="field" onchange="TC.updateSelected('priority',this.value)"><option value="critical" ${t.priority==='critical'?'selected':''}>Kritikus</option><option value="high" ${t.priority==='high'?'selected':''}>Magas</option><option value="normal" ${t.priority==='normal'?'selected':''}>Normál</option><option value="low" ${t.priority==='low'?'selected':''}>Alacsony</option></select><label>Határidő</label><input class="field" value="${html(t.due||'')}" onchange="TC.updateSelected('due',this.value)"/></div><br><div class="desc">${html(t.description||'')}</div><div class="actions"><button class="action" onclick="TC.openSource()">Forrásrekord megnyitása <span>↗</span></button><button class="action" onclick="TC.assignMe()">Magamhoz veszem <span>👤</span></button><button class="action" onclick="TC.notifyAssignee()">Értesítés előkészítése <span>🔔</span></button><button class="action" onclick="TC.queueAi()">AI előkészítés <span>✦</span></button><button class="action" onclick="TC.moveSelected('done')">Feladat lezárása <span>✓</span></button></div></section>`}
function checklist(t){return `<section class="panelSec ${state.sideTab==='checklist'?'active':''}">${(t.checklist||[]).map((x,i)=>`<div class="checkRow"><input type="checkbox" ${x.done?'checked':''} onchange="TC.toggleChecklist(${i})"><span style="${x.done?'text-decoration:line-through;color:var(--muted)':''}">${html(x.text)}</span><button class="close" onclick="TC.deleteChecklist(${i})">×</button></div>`).join('')}<br><input id="newCheck" class="field" placeholder="Új checklist pont"><br><br><button class="btn" onclick="TC.addChecklist()">Hozzáad</button></section>`}
function comments(t){return `<section class="panelSec ${state.sideTab==='comments'?'active':''}">${(t.comments||[]).map(c=>`<div class="comment"><b>${html(c.by)}</b><small>${html(c.at)}</small><div>${html(c.text)}</div></div>`).join('')}<textarea class="field area" id="newComment" placeholder="Komment írása..."></textarea><br><br><button class="btn primary" onclick="TC.addComment()">Komment hozzáadása</button></section>`}
function activity(t){return `<section class="panelSec ${state.sideTab==='activity'?'active':''}">${(t.activity||[]).map(a=>`<div class="activity"><div class="ball">•</div><div><b>${html(a.at)}</b><br>${html(a.text)}</div></div>`).join('')}</section>`}
function agent(t){return `<section class="panelSec ${state.sideTab==='agent'?'active':''}"><div class="aiBox"><b>✦ AI / agent bekötési pont</b><p>Később innen indul a Supabase agent queue, ellenőrzőlista generálás, összefoglaló és automatikus következő lépés.</p><button class="btn primary" onclick="TC.queueAi()">AI előkészítés indítása</button> <button class="btn" onclick="TC.generateChecklist()">Checklist generálás</button></div><br><div class="sourceBox"><b>Payload minta</b><pre style="white-space:pre-wrap;font-size:11px">${html(JSON.stringify({task_id:t.id,source_type:t.source_type,source_id:t.source_id,module:t.module,priority:t.priority},null,2))}</pre></div></section>`}
function renderBulk(){const n=state.selectedIds.length;$('bulkbar').classList.toggle('show',n>0);$('bulkCount').textContent=n+' kijelölve'} function renderBadges(){let active=0,f=state.filters;if(f.module!=='all')active++;if(f.priority!=='all')active++;if(f.onlyAi)active++;if(f.hideDone)active++;$('filterCount').textContent=active;$('notifBadge').textContent=state.notifications.filter(n=>!n.read).length;$('commentBadge').textContent=state.tasks.reduce((a,t)=>a+(t.comments?.length||0),0)} function renderNotifications(){$('notifList').innerHTML=state.notifications.map(n=>`<div class="comment" style="background:${n.read?'#fff':'#fff8ef'}"><b>${html(n.text)}</b><small>${html(n.at)}${n.read?' · olvasott':' · új'}</small></div>`).join('')||'<p>Nincs értesítés.</p>'}
function chip(t,c){return `<span class="chip ${c}">${html(t)}</span>`} function priorityLabel(p){return({critical:'Kritikus',high:'Magas',normal:'Normál',low:'Alacsony'}[p]||p)} function prioClass(p){return p==='critical'?'c-red':p==='high'?'c-yellow':p==='low'?'c-gray':'c-green'} function moduleLabel(m){return({cases:'Ügyek',document:'Dokumentum',partner:'Partner',finance:'Pénzügy',operations:'Művelet',ai:'AI'}[m]||'Forrás')} function moduleClass(m){return m==='cases'?'c-blue':m==='document'?'c-green':m==='partner'?'c-purple':m==='finance'?'c-yellow':m==='operations'?'c-blue':m==='ai'?'c-purple':'c-gray'}
function getSelected(){return state.tasks.find(t=>t.id===state.selectedId)} function addActivity(t,text){t.activity=t.activity||[];t.activity.unshift({at:'Most',text})} function toast(b,s=''){const d=document.createElement('div');d.className='toastItem';d.innerHTML=`<b>${html(b)}</b><small>${html(s)}</small>`;$('toast').appendChild(d);setTimeout(()=>d.remove(),3200)}
function openModal(task){$('taskModal').classList.add('show');$('modalTitle').textContent=task?'Feladat szerkesztése':'Új feladat';$('saveTask').dataset.editId=task?.id||'';$('mTitle').value=task?.title||'';$('mModule').value=task?.module||'cases';$('mStatus').value=task?.status||'new';$('mPriority').value=task?.priority||'normal';$('mAssignee').value=task?.assignee||'me';$('mDue').value=task?.due||'';$('mDesc').value=task?.description||'';$('mSourceType').value=task?.source_type||'';$('mSourceId').value=task?.source_id||'';setTimeout(()=>$('mTitle').focus(),50)}
window.closeModal=()=>$('taskModal').classList.remove('show'); window.saveModal=()=>{const edit=$('saveTask').dataset.editId;let t=edit?state.tasks.find(x=>x.id===edit):null;if(!$('mTitle').value.trim()){toast('Hiányzó cím','Adj meg feladatcímet.');return} if(!t){t={id:'T-'+Math.floor(1000+Math.random()*9000),comments:[],checklist:[],activity:[],created_at:Date.now(),tags:[],progress:0};state.tasks.unshift(t)} Object.assign(t,{title:$('mTitle').value.trim(),module:$('mModule').value,status:$('mStatus').value,priority:$('mPriority').value,assignee:$('mAssignee').value,due:$('mDue').value,description:$('mDesc').value,source_type:$('mSourceType').value,source_id:$('mSourceId').value});addActivity(t,edit?'Feladat szerkesztve.':'Feladat létrehozva.');state.selectedId=t.id;closeModal();emit(edit?'task_center_update_task':'task_center_create_task',{task:t});render();toast(edit?'Feladat mentve':'Új feladat létrehozva',t.title)};
function toggleDrawer(id,show){$(id).classList.toggle('show',show)} window.toggleDrawer=toggleDrawer; window.applyFilters=()=>{state.filters={module:$('fModule').value,priority:$('fPriority').value,onlyAi:$('fAi').checked,hideDone:$('fHideDone').checked};toggleDrawer('filterDrawer',false);render()}; window.resetFilters=()=>{state.filters={module:'all',priority:'all',onlyAi:false,hideDone:false};$('fModule').value='all';$('fPriority').value='all';$('fAi').checked=false;$('fHideDone').checked=false;render()};
function openMenu(x,y,items){$('menuHost').innerHTML=`<div class="menu" style="left:${x}px;top:${y}px">${items.map(i=>`<button onclick="${i.fn}">${i.icon} ${html(i.label)}</button>`).join('')}</div>`} document.addEventListener('click',e=>{if(!e.target.closest('.menu')&&!e.target.closest('.cardMenu')&&!e.target.closest('.more'))$('menuHost').innerHTML=''})
window.TC={selectTask:id=>{state.selectedId=id;emit('task_center_select',{task:getSelected()});render()},openModalForStatus:s=>{openModal({status:s,priority:'normal',module:'cases',assignee:'me'});$('saveTask').dataset.editId=''},editTask:id=>openModal(state.tasks.find(t=>t.id===id)),setSideTab:t=>{state.sideTab=t;renderSide()},dragCard:(ev,id)=>{ev.dataTransfer.setData('text/plain',id);ev.currentTarget.classList.add('dragging')},dropCard:(ev,status)=>{ev.preventDefault();ev.currentTarget.classList.remove('drop');const id=ev.dataTransfer.getData('text/plain');moveTask(id,status)},toggleSelect:(ev,id)=>{ev.stopPropagation();state.selectedIds=state.selectedIds.includes(id)?state.selectedIds.filter(x=>x!==id):[...state.selectedIds,id];render()},openCardMenu:(ev,id)=>{ev.stopPropagation();state.selectedId=id;openMenu(ev.clientX,ev.clientY,[{icon:'✎',label:'Szerkesztés',fn:`TC.editTask('${id}')`},{icon:'▶',label:'Folyamatban',fn:`TC.moveSelected('in_progress')`},{icon:'✓',label:'Lezárás',fn:`TC.moveSelected('done')`},{icon:'✦',label:'AI előkészítés',fn:`TC.queueAi()`}]);renderSide()},openColumnMenu:(ev,status)=>{ev.stopPropagation();openMenu(ev.clientX,ev.clientY,[{icon:'＋',label:'Új feladat ebbe az oszlopba',fn:`TC.openModalForStatus('${status}')`},{icon:'⇅',label:'Oszlop frissítése',fn:`toast('Oszlop frissítve','${col(status).label}')`}])},updateSelected:(k,v)=>{const t=getSelected();if(!t)return;const old=t[k];t[k]=v;addActivity(t,'Módosítva: '+k+' = '+v);emit('task_center_update_field',{task_id:t.id,key:k,value:v,old_value:old});render()},moveSelected:s=>{const t=getSelected();if(t)moveTask(t.id,s)},assignMe:()=>{const t=getSelected();if(t){t.assignee='me';addActivity(t,'Felelős módosítva: '+CURRENT);emit('task_center_assign',{task_id:t.id,assignee:'me'});render();toast('Magadhoz vetted',t.title)}},notifyAssignee:()=>{const t=getSelected();if(t){state.notifications.unshift({text:'Értesítés előkészítve: '+t.title,at:'most',read:false});addActivity(t,'Értesítés előkészítve.');emit('task_center_notify',{task_id:t.id});render();toast('Értesítés előkészítve',t.title)}},openSource:()=>{const t=getSelected();if(t){emit('task_center_open_source',{task_id:t.id,source_type:t.source_type,source_id:t.source_id,module:t.module});toast('Forrás megnyitási kérés elküldve',t.source_type+' / '+t.source_id)}},queueAi:()=>{const t=getSelected();if(t){t.ai_state='queued';t.status='ai_preparing';addActivity(t,'AI előkészítés sorba állítva.');state.notifications.unshift({text:'AI job sorba állítva: '+t.title,at:'most',read:false});emit('task_center_queue_agent',{task_id:t.id,source_type:t.source_type,source_id:t.source_id,module:t.module});render();toast('AI előkészítés indítva',t.title)}},generateChecklist:()=>{const t=getSelected();if(t){['Forrásrekord megnyitása','Hiányzó adatok ellenőrzése','Érintett felelős azonosítása','Eredmény visszarögzítése'].forEach(text=>t.checklist.push({text,done:false}));addActivity(t,'AI checklist generálva.');emit('task_center_agent_generate_checklist',{task_id:t.id});render();toast('Checklist generálva','4 új pont hozzáadva.')}},toggleChecklist:i=>{const t=getSelected();if(t&&t.checklist[i]){t.checklist[i].done=!t.checklist[i].done;addActivity(t,'Checklist módosítva: '+t.checklist[i].text);render()}},deleteChecklist:i=>{const t=getSelected();if(t){t.checklist.splice(i,1);render()}},addChecklist:()=>{const t=getSelected(),el=$('newCheck');if(t&&el&&el.value.trim()){t.checklist.push({text:el.value.trim(),done:false});addActivity(t,'Checklist pont hozzáadva.');render()}},addComment:()=>{const t=getSelected(),el=$('newComment');if(t&&el&&el.value.trim()){t.comments.unshift({by:CURRENT,at:'Most',text:el.value.trim()});addActivity(t,'Új komment hozzáadva.');emit('task_center_comment',{task_id:t.id,text:el.value.trim()});render();toast('Komment hozzáadva',t.title)}}};
function moveTask(id,status){const t=state.tasks.find(x=>x.id===id);if(!t)return;const old=t.status;t.status=status;addActivity(t,'Státusz váltás: '+col(old)[1]+' → '+col(status)[1]);state.selectedId=id;emit('task_center_status_change',{task_id:id,status,old_status:old});render();toast('Státusz módosítva',t.title+' → '+col(status)[1])} window.bulkMove=status=>{state.selectedIds.forEach(id=>{const t=state.tasks.find(x=>x.id===id);if(t){t.status=status;addActivity(t,'Bulk státusz váltás: '+col(status)[1])}});emit('task_center_bulk_status_change',{task_ids:state.selectedIds,status});toast('Tömeges módosítás',state.selectedIds.length+' feladat → '+col(status)[1]);state.selectedIds=[];render()}; window.clearSelection=()=>{state.selectedIds=[];render()}; window.unselect=()=>{state.selectedId=null;render()};
function init(){load();$('searchInput').addEventListener('input',e=>{state.search=e.target.value;render()});$('btnNew').onclick=()=>openModal(null);$('btnFilters').onclick=()=>toggleDrawer('filterDrawer',true);$('btnNotif').onclick=()=>toggleDrawer('notifDrawer',true);$('boardBtn').onclick=()=>{state.view='board';$('boardBtn').classList.add('active');$('listBtn').classList.remove('active');render()};$('listBtn').onclick=()=>{state.view='list';$('listBtn').classList.add('active');$('boardBtn').classList.remove('active');render()};$('sortSelect').onchange=e=>{state.sort=e.target.value;render()};$('btnReset').onclick=()=>{localStorage.removeItem(LS);state.tasks=sample();state.selectedId=null;state.selectedIds=[];render();toast('Mintaadatok visszaállítva')};document.addEventListener('keydown',e=>{if((e.ctrlKey||e.metaKey)&&e.key.toLowerCase()==='k'){e.preventDefault();$('searchInput').focus()} if(e.key==='n'&&!e.ctrlKey&&!e.metaKey)openModal(null); if(e.key==='Escape'){closeModal();toggleDrawer('filterDrawer',false);toggleDrawer('notifDrawer',false)}});render();emit('task_center_ready',{version:'standalone-lux-v1'});}
init();
})();
</script>
