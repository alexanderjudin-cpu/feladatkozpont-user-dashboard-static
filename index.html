);font-size:20px}.sideBody{padding:14px 16px;overflow:auto}.selectedTitle{font-size:15px;font-weight:900;line-height:1.35}.sourceLine{color:var(--muted);font-size:11px;margin-top:8px}.sideTabs{display:flex;gap:15px;margin-top:16px;border-bottom:1px solid var(--line2);overflow:auto}.sideTabs button{border:0;background:transparent;padding:0 0 10px;color:#575a62;font-size:12px;font-weight:900;white-space:nowrap}.sideTabs button.active{color:#c36c00;border-bottom:2px solid var(--orange)}.sec{display:none;margin-top:14px}.sec.active{display:block}.detailGrid{display:grid;grid-template-columns:96px 1fr;gap:11px 8px}.detailGrid label{color:var(--muted)}.field{height:32px;border:1px solid var(--line);border-radius:8px;padding:0 9px;background:#fff;width:100%}.area{height:80px;padding:8px;resize:vertical}.desc,.sourceBox{border:1px solid var(--line2);border-radius:10px;padding:10px;background:#fafafa;font-size:12px;line-height:1.45}.actions{margin-top:14px;display:flex;flex-direction:column;gap:8px}.action{height:34px;border:1px solid var(--line);border-radius:9px;background:#fff;display:flex;align-items:center;justify-content:space-between;padding:0 10px;font-weight:800}.action:hover{background:#fff8ef;border-color:#f0b85d}.checkRow{display:flex;gap:8px;align-items:center;padding:8px 0;border-bottom:1px solid var(--line2)}.checkRow input{accent-color:var(--orange)}.comment,.activity{border:1px solid var(--line2);border-radius:10px;padding:9px;margin-bottom:8px;background:#fff}.comment small{display:block;color:var(--muted);margin:3px 0 6px}.aiBox{border:1px solid #dcc8ff;background:#fbf8ff;border-radius:12px;padding:12px}.aiBox b{color:#6d35c6}.drawer{position:fixed;top:0;right:-420px;width:390px;height:100vh;background:#fff;box-shadow:var(--shadow);z-index:40;border-left:1px solid var(--line);transition:.2s;display:flex;flex-direction:column}.drawer.show{right:0}.drawerHead{height:58px;border-bottom:1px solid var(--line2);display:flex;align-items:center;padding:0 16px}.dra <body>
<div class="app">
  <header class="top"><div class="hamb">☰</div><div class="brand">Feladatközpont <span>•</span> User Dashboard</div><div class="search">⌕<input id="search" placeholder="Keresés feladatok, forrásrekordok, címkék között..."/><span class="kbd">Ctrl K</span></div><button id="filterBtn" class="btn">⛃ Szűrők <span id="filterCount">0</span></button><button id="newBtn" class="btn primary">＋ Új feladat</button><div class="spacer"></div><button id="notifBtn" class="icon">🔔<span id="notifBadge" class="badge">0</span></button><button class="icon">💬<span id="commentBadge" class="badge blueBadge">0</span></button><button class="icon">✦</button><div class="avatar">GB</div><div class="avatar b">KM</div><div class="avatar c">+3</div></header>

  <div id="bulk" class="bulk"><b id="bulkCount">0 kijelölve</b><button class="btn" onclick="bulkMove('in_progress')">Folyamatban</button><button class="btn" onclick="bulkMove('waiting')">Jóváhagyásra</button><button class="btn" onclick="bulkMove('done')">Kész</button><button class="btn danger" onclick="clearSel()">Kijelölés törlése</button></div>
  <div class="workspace"><section class="main"><div id="board" class="board"></div><div id="list" class="list"></div><div id="calendarPage" class="page"></div><div id="automationPage" class="page"></div><div id="settingsPage" class="page"></div></section><aside class="side"><div class="sideHead"><b id="sideTitle">Kijelölt feladat</b><button class="close" onclick="unselect()">×</button></div><div id="side" class="sideBody"></div></aside></div>

</div>
<div id="filterDrawer" class="drawer"><div class="drawerHead"><b>Szűrők</b><button class="close" onclick="drawer('filterDrawer',false)">×</button></div><div class="drawerBody"><label>Forrás</label><select id="fModule" class="field"><option value="all">Összes</option><option value="case">Ügy</option><option value="document">Dokumentum</option><option value="partner">Partner</option><option value="finance">Pénzügy</option><option value="operation">Művelet</option><option value="ai">AI</option></select><br><br><label>Prioritás</label><select id="fPrio" class="field"><option value="all">Összes</option><option value="critical">Kritikus</option><option value="high">Magas</option><option value="normal">Normál</option><option value="low">Alacsony</option></select><br><br><label><input id="fAi" type="checkbox"> Csak AI / agent</label><br><br><label><input id="fDone" type="checkbox"> Kész elrejtése</label><br><br><button class="btn primary" onclick="applyFilters()">Alkalmaz</button> <button class="btn" onclick="resetFilters()">Reset</button></div></div>
<div id="notifDrawer" class="drawer"><div class="drawerHead"><b>Értesítések</b><button class="close" onclick="drawer('notifDrawer',false)">×</button></div><div id="notifList" class="drawerBody"></div></div>
<div id="modal" class="modalShade"><div class="modal"><div class="modalHead"><b id="modalTitle">Új feladat</b><button class="close" onclick="closeModal()">×</button></div><div class="modalBody"><div class="wide"><label>Cím</label><input id="mTitle" class="field"></div><div><label>Forrás</label><select id="mModule" class="field"><option value="case">Ügy</option><option value="document">Dokumentum</option><option value="partner">Partner</option><option value="finance">Pénzügy</option><option value="operation">Művelet</option><option value="ai">AI</option></select></div><div><label>Státusz</label><select id="mStatus" class="field"><option value="new">Új</option><option value="in_progress">Folyamatban</option><option value="waiting">Jóváhagyásra vár</option><option value="ai_preparing">AI előkészítés</option><option value="done">Kész</option></select></div><div><label>Prioritás</label><select id="mPriority" class="field"><option value="critical">Kritikus</option><option value="high">Magas</option><option value="normal">Normál</option><option value="low">Alacsony</option></select></div><div><label>Felelős</label><select id="mAssignee" class="field"><option value="me">Én</option><option value="gb">Gál Balázs</option><option value="km">Kovács Míra</option><option value="team">Csapat</option></select></div><div><label>Határidő</label><input id="mDue" class="field" placeholder="Ma 14:00"></div><div><label>Forrás típus</label><input id="mSourceType" class="field" placeholder="case / record / event"></div><div><label>Forrás ID</label><input id="mSourceId" class="field" placeholder="SRC-001"></div><div class="wide"><label>Leírás</label><textarea id="mDesc" class="field area"></textarea></div></div><div class="modalFoot"><button class="btn" onclick="closeModal()">Mégse</button><button class="btn primary" onclick="saveModal()">Mentés</button></div></div></div>
<div id="toast" class="toast"></div><div id="menuHost"></div>
<script>
(()=>{const $=id=>document.getElementById(id), esc=s=>String(s??'').replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m])); const LS='feladatkozpont_clickable_tabs_v2';
const COLS=[['new','Új','＋','var(--blue)'],['in_progress','Folyamatban','▶','var(--orange)'],['waiting','Jóváhagyásra vár','◷','var(--yellow)'],['ai_preparing','AI előkészítés','✦','var(--purple)'],['done','Kész','✓','var(--green)']];
let state={page:'mine',view:'board',selected:null,selectedIds:[],sideTab:'details',search:'',sort:'priority',filters:{module:'all',prio:'all',ai:false,done:false},notifs:[{text:'Új minta teendő érkezett',at:'most',read:false}],tasks:[]};
function sample(){return[{id:'T-1001',title:'Minta feladat: új ügy ellenőrzése',module:'case',status:'new',priority:'critical',assignee:'me',due:'Ma 10:00',source_type:'case',source_id:'SRC-001',desc:'Placeholder kártya. Később bármelyik Supabase rekordból automatikusan jöhet ilyen feladat.',tags:['új','ellenőrzés'],progress:30,comments:[{by:'Rendszer',at:'most',text:'Automatikusan létrehozott feladat mintája.'}],checks:[{text:'Forrásrekord megnyitása',done:false},{text:'Adatok ellenőrzése',done:false}],activity:['Kártya létrehozva.']},{id:'T-1002',title:'Hiányzó adat pótlása',module:'document',status:'new',priority:'high',assignee:'km',due:'Ma 14:30',source_type:'record',source_id:'SRC-002',desc:'Dokumentum vagy mezőhiány placeholder.',tags:['adat','hiányzó'],progress:10,comments:[],checks:[{text:'Hiányzó mezők listázása',done:true},{text:'Érintett user értesítése',done:false}],activity:['Hiányzó adat jelölve.']},{id:'T-1003',title:'Partner visszajelzés követése',module:'partner',status:'in_progress',priority:'normal',assignee:'gb',due:'Holnap 09:00',source_type:'partner_event',source_id:'SRC-003',desc:'Külső vagy belső visszajelzés követési placeholder.',tags:['partner','follow-up'],progress:55,comments:[{by:'Kovács Míra',at:'1 órája',text:'Válaszra várunk.'}],checks:[{text:'Utolsó üzenet ellenőrzése',done:true},{text:'Emlékeztető előkészítése',done:false}],activity:['Komment hozzáadva.']},{id:'T-1004',title:'Jóváhagyás: rekord ellenőrzése',module:'operation',status:'waiting',priority:'high',assignee:'team',due:'Ma 16:00',source_type:'approval',source_id:'SRC-004',desc:'Jóváhagyási folyamat placeholder.',tags:['jóváhagyás'],progress:70,comments:[],checks:[{text:'Adatlap ellenőrzése',done:true},{text:'Jóváhagyás rögzítése',done:false}],activity:['Jóváhagyásra küldve.']},{id:'T-1005',title:'AI: ellenőrző lista előkészítése',module:'ai',status:'ai_preparing',priority:'normal',assignee:'me',due:'Ma 17:00',source_type:'agent_job',source_id:'SRC-005',desc:'Agent queue bekötési pont mintája.',tags:['AI','agent'],ai:true,progress:40,comments:[],checks:[{text:'Agent payload összeállítása',done:false}],activity:['AI javaslat generálva.']},{id:'T-1006',title:'Lezárt minta feladat',module:'finance',status:'done',priority:'low',assignee:'gb',due:'Tegnap',source_type:'record',source_id:'SRC-006',desc:'Kész állapotú placeholder.',tags:['lezárt'],progress:100,comments:[],checks:[{text:'Ellenőrzés kész',done:true}],activity:['Feladat lezárva.']}]} function load(){try{state={...state,...JSON.parse(localStorage.getItem(LS))}; if(!state.tasks?.length)state.tasks=sample()}catch(e){state.tasks=sample()}} function save(){localStorage.setItem(LS,JSON.stringify(state))} function emit(type,payload){try{parent.postMessage({type,payload,source:'feladatkozpont'},'*')}catch(e){}}
window.addEventListener('message',e=>{const m=e.data||{}; if(m.type==='task_center_set_tasks'&&m.payload?.tasks){state.tasks=m.payload.tasks; save(); render(); toast('Live adatok betöltve')}});
function pageData(){let a=[...state.tasks]; if(state.page==='mine')a=a.filter(t=>t.assignee==='me'); if(state.page==='team')a=a.filter(t=>t.assignee!=='me'); const q=state.search.toLowerCase(),f=state.filters;if(q)a=a.filter(t=>[t.title,t.module,t.priority,t.assignee,t.source_id,t.source_type,(t.tags||[]).join(' ')].join(' ').toLowerCase().includes(q)); if(f.module!=='all')a=a.filter(t=>t.module===f.module); if(f.prio!=='all')a=a.filter(t=>t.priority===f.prio); if(f.ai)a=a.filter(t=>t.module==='ai'||t.ai); if(f.done)a=a.filter(t=>t.status!=='done'); const r={critical:1,high:2,normal:3,low:4}; a.sort((x,y)=>state.sort==='priority'?r[x.priority]-r[y.priority]:state.sort==='newest'?(y.created||0)-(x.created||0):String(x.due).localeCompare(String(y.due)));return a}
function render(){save(); renderStats(); renderMain(); renderSide(); renderBulk(); renderNotifs(); document.querySelectorAll('.tab').forEach(b=>b.classList.toggle('active',b.dataset.view===state.page)); $('boardTools').style.display=['mine','team','all'].includes(state.page)?'block':'none'; $('sort').style.display=['mine','team','all'].includes(state.page)?'block':'none'}
function renderStats(){const d=pageData(); const s=[['Nyitott',d.filter(x=>x.status!=='done').length,'＋','var(--blue)'],['Folyamatban',d.filter(x=>x.status==='in_progress').length,'▶','var(--orange)'],['Kritikus',d.filter(x=>x.priority==='critical').length,'!','var(--red)'],['AI javaslat',d.filter(x=>x.module==='ai'||x.ai).length,'✦','var(--purple)']]; $('stats').innerHTML=s.map(x=>`<div class="stat"><div class="statI" style="background:${x[3]}">${x[2]}</div><div><small>${x[0]}</small><b>${x[1]}</b></div><em>live-ready</em></div>`).join('')}
function renderMain(){['board','list','calendarPage','automationPage','settingsPage'].forEach(id=>$(id).style.display='none'); if(['mine','team','all'].includes(state.page)){ if(state.view==='board'){ $('board').style.display='grid'; renderBoard()} else {$('list').style.display='block'; renderList()} } if(state.page==='calendar'){ $('calendarPage').style.display='block'; renderCalendar()} if(state.page==='automations'){ $('automationPage').style.display='block'; renderAutos()} if(state.page==='settings'){ $('settingsPage').style.display='block'; renderSettings()}}
function renderBoard(){const d=pageData(); $('board').innerHTML=COLS.map(c=>{const arr=d.filter(t=>t.status===c[0]); return `<div class="col" ondragover="event.preventDefault();this.classList.add('drop')" ondragleave="this.classList.remove('drop')" ondrop="TC.drop(event,'${c[0]}')"><div class="colHead"><span class="dot" style="background:${c[3]}">${c[2]}</span>${c[1]}<span class="count">${arr.length}</span><button class="more" onclick="TC.colMenu(event,'${c[0]}')">⋯</button></div><div class="cards">${arr.map(card).join('')}</div><button class="add" onclick="TC.openModal('${c[0]}')">＋ Feladat hozzáadása</button></div>`}).join('')}
function card(t){const ini=assignee(t.assignee).ini; return `<article class="card ${t.id===state.selected?'selected':''} ${t.priority==='critical'?'critical':''} ${t.ai||t.module==='ai'?'ai':''}" draggable="true" ondragstart="TC.drag(event,'${t.id}')" onclick="TC.select('${t.id}')" ondblclick="TC.edit('${t.id}')"><div class="cardTop"><span class="check ${state.selectedIds.includes(t.id)?'on':''}" onclick="TC.check(event,'${t.id}')">✓</span><div class="title">${esc(t.title)}</div><button class="cardMenu" onclick="TC.cardMenu(event,'${t.id}')">⋯</button></div><div class="chips">${chip(prio(t.priority),pc(t.priority))}${chip(mod(t.module),mc(t.module))}${t.ai?chip('AI','purple'):''}</div><div class="meta"><span>📅 ${esc(t.due)}</span><span>💬 ${(t.comments||[]).length}</span><span>☑ ${(t.checks||[]).filter(x=>x.done).length}/${(t.checks||[]).length}</span><span class="mini">${ini}</span></div><div class="prog"><span style="width:${t.progress||0}%"></span></div></article>`}
function renderList(){const rows=pageData().map(t=>`<tr onclick="TC.select('${t.id}')"><td><b>${esc(t.title)}</b><br><small>${esc(t.source_type)} · ${esc(t.source_id)}</small></td><td>${chip(COLS.find(c=>c[0]===t.status)?.[1]||t.status,'gray')}</td><td>${chip(prio(t.priority),pc(t.priority))}</td><td>${chip(mod(t.module),mc(t.module))}</td><td>${assignee(t.assignee).name}</td><td>${esc(t.due)}</td></tr>`).join(''); $('list').innerHTML=`<table><thead><tr><th>Feladat</th><th>Státusz</th><th>Prioritás</th><th>Forrás</th><th>Felelős</th><th>Határidő</th></tr></thead><tbody>${rows}</tbody></table>`}
function renderCalendar(){let days=['Hétfő','Kedd','Szerda','Csütörtök','Péntek','Szombat','Vasárnap']; let d=pageData(); $('calendarPage').innerHTML=`<h2>Naptár nézet</h2><p class="sourceBox">Ez is kattintható. Később ide jönnek a valódi határidők Supabase-ből.</p><div class="calendar">${days.map((x,i)=>`<div class="day"><b>${x}</b>${d.filter((_,n)=>n%7===i).map(t=>`<div class="calTask" onclick="TC.select('${t.id}')">${esc(t.due)}<br><b>${esc(t.title)}</b></div>`).join('')}</div>`).join('')}</div>`}
function renderAutos(){$('automationPage').innerHTML=`<h2>Automatizmusok</h2><div class="gridCards">${['Új case → kártya','Hiányzó adat → figyelmeztetés','Határidő előtt → értesítés','AI összefoglaló','Jóváhagyás után → lezárás','Webhook / Supabase event'].map((x,i)=>`<div class="tile"><h3>${x}</h3><p>Placeholder automatizmus. Később Supabase trigger / Retool query / agent queue hívás lesz mögötte.</p><button class="btn primary" onclick="toast('Automatizmus bekapcsolva','${x}')">Bekapcsolás</button> <button class="btn" onclick="toast('Teszt futtatva','${x}')">Teszt</button></div>`).join('')}</div>`}
function renderSettings(){$('settingsPage').innerHTML=`<h2>Beállítások</h2><div class="gridCards"><div class="tile"><h3>Nézet</h3><label><input type="checkbox" checked> kompakt kártyák</label><br><label><input type="checkbox" checked> jobb oldali panel</label><br><br><button class="btn primary" onclick="toast('Beállítás mentve')">Mentés</button></div><div class="tile"><h3>Live bekötés</h3><p>Ide kerül majd Supabase URL, anon key / Retool bridge, realtime channel.</p><button class="btn" onclick="emit('task_center_settings_open',{}) ; toast('Bridge esemény elküldve')">Bridge teszt</button></div><div class="tile"><h3>Jogosultság</h3><p>Placeholder: saját / csapat / minden jogosult nézet role alapján.</p><button class="btn" onclick="toast('Jogosultság teszt')">Ellenőrzés</button></div></div>`}
function renderSide(){const t=state.tasks.find(x=>x.id===state.selected); if(!t){$('side').innerHTML='<div class="sourceBox"><b>Nincs kijelölt feladat</b><br>Kattints egy kártyára, naptár elemre vagy listás sorra.</div>'; return} const tabs=[['details','Részletek'],['checks','Checklist'],['comments','Kommentek'],['activity','Activity'],['ai','AI / Agent']]; $('side').innerHTML=`<div class="selectedTitle">${esc(t.title)}</div><div class="sourceLine">${esc(t.source_type)} · ${esc(t.source_id)}</div><div class="chips">${chip(prio(t.priority),pc(t.priority))}${chip(mod(t.module),mc(t.module))}${t.ai?chip('AI','purple'):''}</div><div class="sideTabs">${tabs.map(x=>`<button class="${state.sideTab===x[0]?'active':''}" onclick="TC.sideTab('${x[0]}')">${x[1]}</button>`).join('')}</div>${secDetails(t)}${secChecks(t)}${secComments(t)}${secActivity(t)}${secAi(t)}`}
function secDetails(t){return `<section class="sec ${state.sideTab==='details'?'active':''}"><div class="detailGrid"><label>Felelős</label><select class="field" onchange="TC.set('assignee',this.value)">${['me','gb','km','team'].map(a=>`<option value="${a}" ${t.assignee===a?'selected':''}>${assignee(a).name}</option>`)}</select><label>Státusz</label><select class="field" onchange="TC.set('status',this.value)">${COLS.map(c=>`<option value="${c[0]}" ${t.status===c[0]?'selected':''}>${c[1]}</option>`)}</select><label>Prioritás</label><select class="field" onchange="TC.set('priority',this.value)">${['critical','high','normal','low'].map(p=>`<option value="${p}" ${t.priority===p?'selected':''}>${prio(p)}</option>`)}</select><label>Határidő</label><input class="field" value="${esc(t.due)}" onchange="TC.set('due',this.value)"></div><br><div class="desc">${esc(t.desc)}</div><div class="actions"><button class="action" onclick="TC.source()">Forrásrekord megnyitása <span>↗</span></button><button class="action" onclick="TC.mine()">Magamhoz veszem <span>👤</span></button><button class="action" onclick="TC.notify()">Értesítés előkészítése <span>🔔</span></button><button class="action" onclick="TC.ai()">AI előkészítés <span>✦</span></button><button class="action" onclick="TC.move('done')">Feladat lezárása <span>✓</span></button></div></section>`}
function secChecks(t){return `<section class="sec ${state.sideTab==='checks'?'active':''}">${(t.checks||[]).map((c,i)=>`<div class="checkRow"><input type="checkbox" ${c.done?'checked':''} onchange="TC.toggleCheck(${i})"><span style="${c.done?'text-decoration:line-through;color:#888':''}">${esc(c.text)}</span><button class="close" onclick="TC.delCheck(${i})">×</button></div>`).join('')}<br><input id="newCheck" class="field" placeholder="Új checklist pont"><br><br><button class="btn" onclick="TC.addCheck()">Hozzáad</button></section>`}
function secComments(t){return `<section class="sec ${state.sideTab==='comments'?'active':''}">${(t.comments||[]).map(c=>`<div class="comment"><b>${esc(c.by)}</b><small>${esc(c.at)}</small>${esc(c.text)}</div>`).join('')}<textarea id="newComment" class="field area" placeholder="Komment írása..."></textarea><br><br><button class="btn primary" onclick="TC.addComment()">Komment hozzáadása</button></section>`}
function secActivity(t){return `<section class="sec ${state.sideTab==='activity'?'active':''}">${(t.activity||[]).map(a=>`<div class="activity">• ${esc(a)}</div>`).join('')}</section>`}
function secAi(t){return `<section class="sec ${state.sideTab==='ai'?'active':''}"><div class="aiBox"><b>✦ AI / agent bekötési pont</b><p>Később innen indul az agent queue, ellenőrzőlista, összefoglaló vagy automata következő lépés.</p><button class="btn primary" onclick="TC.ai()">AI előkészítés indítása</button> <button class="btn" onclick="TC.genChecks()">Checklist generálás</button></div><br><div class="sourceBox"><pre>${esc(JSON.stringify({task_id:t.id,source_type:t.source_type,source_id:t.source_id,module:t.module},null,2))}</pre></div></section>`}
function renderBulk(){const n=state.selectedIds.length;$('bulk').classList.toggle('show',n>0);$('bulkCount').textContent=n+' kijelölve'} function renderNotifs(){$('notifBadge').textContent=state.notifs.filter(n=>!n.read).length;$('commentBadge').textContent=state.tasks.reduce((a,t)=>a+(t.comments?.length||0),0);$('filterCount').textContent=Object.values(state.filters).filter(v=>v!==false&&v!=='all').length;$('notifList').innerHTML=state.notifs.map(n=>`<div class="comment"><b>${esc(n.text)}</b><small>${esc(n.at)}</small></div>`).join('')||'<p>Nincs értesítés.</p>'}
function chip(t,c){return `<span class="chip ${c}">${esc(t)}</span>`} function prio(p){return {critical:'Kritikus',high:'Magas',normal:'Normál',low:'Alacsony'}[p]||p} function pc(p){return p==='critical'?'red':p==='high'?'yellow':p==='low'?'gray':'green'} function mod(m){return {case:'Ügy',document:'Dokumentum',partner:'Partner',finance:'Pénzügy',operation:'Művelet',ai:'AI'}[m]||m} function mc(m){return m==='ai'?'purple':m==='document'?'green':m==='partner'?'purple':m==='finance'?'yellow':'blue'} function assignee(a){return {me:{name:'Én',ini:'ÉN'},gb:{name:'Gál Balázs',ini:'GB'},km:{name:'Kovács Míra',ini:'KM'},team:{name:'Csapat',ini:'CS'}}[a]||{name:a,ini:'--'}} function toast(b,s=''){const d=document.createElement('div');d.className='toastItem';d.innerHTML=`<b>${esc(b)}</b><br><small>${esc(s)}</small>`;$('toast').appendChild(d);setTimeout(()=>d.remove(),3000)} function activity(t,msg){t.activity=t.activity||[];t.activity.unshift(msg)} function selected(){return state.tasks.find(t=>t.id===state.selected)}
function openModal(t){$('modal').classList.add('show');$('modalTitle').textContent=t?'Feladat szerkesztése':'Új feladat';$('modal').dataset.edit=t?.id||'';$('mTitle').value=t?.title||'';$('mModule').value=t?.module||'case';$('mStatus').value=t?.status||'new';$('mPriority').value=t?.priority||'normal';$('mAssignee').value=t?.assignee||'me';$('mDue').value=t?.due||'';$('mSourceType').value=t?.source_type||'';$('mSourceId').value=t?.source_id||'';$('mDesc').value=t?.desc||'';setTimeout(()=>$('mTitle').focus(),50)} window.closeModal=()=>$('modal').classList.remove('show'); window.saveModal=()=>{let id=$('modal').dataset.edit,t=id?state.tasks.find(x=>x.id===id):null;if(!$('mTitle').value.trim())return toast('Adj címet'); if(!t){t={id:'T-'+Math.floor(1000+Math.random()*9000),comments:[],checks:[],activity:[],tags:[],created:Date.now(),progress:0};state.tasks.unshift(t)} Object.assign(t,{title:$('mTitle').value,module:$('mModule').value,status:$('mStatus').value,priority:$('mPriority').value,assignee:$('mAssignee').value,due:$('mDue').value,source_type:$('mSourceType').value,source_id:$('mSourceId').value,desc:$('mDesc').value,ai:$('mModule').value==='ai'});activity(t,id?'Feladat szerkesztve.':'Feladat létrehozva.');state.selected=t.id;closeModal();emit(id?'task_center_update_task':'task_center_create_task',{task:t});render();toast(id?'Feladat mentve':'Új feladat létrehozva',t.title)}; window.drawer=(id,on)=>$(id).classList.toggle('show',on); window.applyFilters=()=>{state.filters={module:$('fModule').value,prio:$('fPrio').value,ai:$('fAi').checked,done:$('fDone').checked};drawer('filterDrawer',false);render()}; window.resetFilters=()=>{state.filters={module:'all',prio:'all',ai:false,done:false};$('fModule').value='all';$('fPrio').value='all';$('fAi').checked=false;$('fDone').checked=false;render()}; window.unselect=()=>{state.selected=null;render()}; window.bulkMove=s=>{state.selectedIds.forEach(id=>move(id,s,true));emit('task_center_bulk_status_change',{task_ids:state.selectedIds,status:s});state.selectedIds=[];render();toast('Tömeges módosítás kész')}; window.clearSel=()=>{state.selectedIds=[];render()};
function move(id,status,silent=false){const t=state.tasks.find(x=>x.id===id); if(!t)return;const old=t.status;t.status=status;activity(t,'Státusz váltás: '+old+' → '+status);state.selected=id;emit('task_center_status_change',{task_id:id,status,old_status:old}); if(!silent)toast('Státusz módosítva',t.title);render()}
window.TC={select:id=>{state.selected=id;emit('task_center_select',{task:selected()});render()},drag:(e,id)=>{e.dataTransfer.setData('text/plain',id);e.currentTarget.classList.add('drag')},drop:(e,status)=>{e.preventDefault();e.currentTarget.classList.remove('drop');move(e.dataTransfer.getData('text/plain'),status)},check:(e,id)=>{e.stopPropagation();state.selectedIds=state.selectedIds.includes(id)?state.selectedIds.filter(x=>x!==id):[...state.selectedIds,id];render()},openModal:s=>openModal({status:s,priority:'normal',module:'case',assignee:'me'}),edit:id=>openModal(state.tasks.find(t=>t.id===id)),move:s=>{const t=selected();if(t)move(t.id,s)},set:(k,v)=>{const t=selected();if(!t)return;t[k]=v;activity(t,'Módosítva: '+k);emit('task_center_update_field',{task_id:t.id,key:k,value:v});render()},sideTab:t=>{state.sideTab=t;renderSide()},mine:()=>{let t=selected();if(t){t.assignee='me';activity(t,'Magamhoz vettem.');emit('task_center_assign',{task_id:t.id,assignee:'me'});render();toast('Magadhoz vetted')}},notify:()=>{let t=selected();if(t){state.notifs.unshift({text:'Értesítés előkészítve: '+t.title,at:'most',read:false});activity(t,'Értesítés előkészítve.');emit('task_center_notify',{task_id:t.id});render();toast('Értesítés előkészítve')}},source:()=>{let t=selected();if(t){emit('task_center_open_source',{task_id:t.id,source_type:t.source_type,source_id:t.source_id});toast('Forrásrekord megnyitási esemény elküldve')}},ai:()=>{let t=selected();if(t){t.ai=true;t.module='ai';t.status='ai_preparing';activity(t,'AI előkészítés sorba állítva.');state.notifs.unshift({text:'AI job sorba állítva: '+t.title,at:'most',read:false});emit('task_center_queue_agent',{task_id:t.id});render();toast('AI előkészítés indítva')}},genChecks:()=>{let t=selected();if(t){['Forrásrekord megnyitása','Hiányzó adatok ellenőrzése','Érintett felelős azonosítása','Eredmény visszarögzítése'].forEach(x=>t.checks.push({text:x,done:false}));activity(t,'AI checklist generálva.');render();toast('Checklist generálva')}},toggleCheck:i=>{let t=selected();if(t?.checks[i]){t.checks[i].done=!t.checks[i].done;render()}},delCheck:i=>{let t=selected();if(t){t.checks.splice(i,1);render()}},addCheck:()=>{let t=selected(),v=$('newCheck')?.value.trim();if(t&&v){t.checks.push({text:v,done:false});render()}},addComment:()=>{let t=selected(),v=$('newComment')?.value.trim();if(t&&v){t.comments.unshift({by:'Gál Balázs',at:'Most',text:v});activity(t,'Komment hozzáadva.');emit('task_center_comment',{task_id:t.id,text:v});render();toast('Komment hozzáadva')}},cardMenu:(e,id)=>{e.stopPropagation();state.selected=id;menu(e.clientX,e.clientY,[['✎','Szerkesztés',`TC.edit('${id}')`],['▶','Folyamatban',`TC.move('in_progress')`],['✓','Lezárás',`TC.move('done')`],['✦','AI előkészítés',`TC.ai()`]]);renderSide()},colMenu:(e,s)=>{e.stopPropagation();menu(e.clientX,e.clientY,[['＋','Új feladat ebbe az oszlopba',`TC.openModal('${s}')`],['↺','Oszlop frissítése',`toast('Oszlop frissítve')`]])}};
function menu(x,y,items){$('menuHost').innerHTML=`<div class="menu" style="left:${x}px;top:${y}px">${items.map(i=>`<button onclick="${i[2]}">${i[0]} ${i[1]}</button>`).join('')}</div>`} document.addEventListener('click',e=>{if(!e.target.closest('.menu')&&!e.target.closest('.cardMenu')&&!e.target.closest('.more'))$('menuHost').innerHTML=''});
function init(){load();document.querySelectorAll('.tab').forEach(b=>b.onclick=()=>{state.page=b.dataset.view;state.selected=null;toast('Nézet váltva',b.textContent.trim());emit('task_center_view_change',{view:state.page});render()});$('search').oninput=e=>{state.search=e.target.value;render()};$('newBtn').onclick=()=>openModal(null);$('filterBtn').onclick=()=>drawer('filterDrawer',true);$('notifBtn').onclick=()=>drawer('notifDrawer',true);$('boardBtn').onclick=()=>{state.view='board';$('boardBtn').classList.add('active');$('listBtn').classList.remove('active');render()};$('listBtn').onclick=()=>{state.view='list';$('listBtn').classList.add('active');$('boardBtn').classList.remove('active');render()};$('sort').onchange=e=>{state.sort=e.target.value;render()};$('resetBtn').onclick=()=>{localStorage.removeItem(LS);state.tasks=sample();state.page='mine';state.selected=null;state.selectedIds=[];render();toast('Mintaadatok visszaállítva')};document.addEventListener('keydown',e=>{if((e.ctrlKey||e.metaKey)&&e.key.toLowerCase()==='k'){e.preventDefault();$('search').focus()} if(e.key==='n'&&!e.ctrlKey&&!e.metaKey)openModal(null); if(e.key==='Escape'){closeModal();drawer('filterDrawer',false);drawer('notifDrawer',false)}});render();emit('task_center_ready',{version:'clickable-tabs-v2'})} init();
})();
</script>
